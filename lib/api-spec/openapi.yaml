openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RedPulse Blood Donation Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: donors
    description: Donor management
  - name: requests
    description: Blood request management
  - name: auth
    description: Authentication
  - name: appointments
    description: Donation appointments
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /donors:
    get:
      operationId: getDonors
      tags: [donors]
      summary: Get all donors
      parameters:
        - name: bloodType
          in: query
          required: false
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
        - name: available
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of donors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Donor"
    post:
      operationId: createDonor
      tags: [donors]
      summary: Register as a donor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonorRequest"
      responses:
        "201":
          description: Donor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /donors/{id}:
    get:
      operationId: getDonorById
      tags: [donors]
      summary: Get donor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Donor found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
        "404":
          description: Donor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blood-requests:
    get:
      operationId: getBloodRequests
      tags: [requests]
      summary: Get all blood requests
      parameters:
        - name: bloodType
          in: query
          required: false
          schema:
            type: string
        - name: urgency
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of blood requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BloodRequest"
    post:
      operationId: createBloodRequest
      tags: [requests]
      summary: Create a blood request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBloodRequestRequest"
      responses:
        "201":
          description: Blood request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blood-requests/{id}:
    patch:
      operationId: updateBloodRequest
      tags: [requests]
      summary: Update blood request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBloodRequestRequest"
      responses:
        "200":
          description: Blood request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [donors]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments:
    get:
      operationId: getAppointments
      tags: [appointments]
      summary: Get appointments for logged-in donor
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book a donation appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/{id}:
    get:
      operationId: getAppointmentById
      tags: [appointments]
      summary: Get appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Donor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bloodType:
          type: string
        city:
          type: string
        phone:
          type: string
        email:
          type: string
        age:
          type: integer
          nullable: true
        isAvailable:
          type: boolean
        lastDonation:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - bloodType
        - city
        - phone
        - email
        - isAvailable
        - createdAt

    CreateDonorRequest:
      type: object
      properties:
        name:
          type: string
        bloodType:
          type: string
        city:
          type: string
        phone:
          type: string
        email:
          type: string
        age:
          type: integer
          nullable: true
        password:
          type: string
        lastDonation:
          type: string
          nullable: true
      required:
        - name
        - bloodType
        - city
        - phone
        - email

    BloodRequest:
      type: object
      properties:
        id:
          type: integer
        patientName:
          type: string
        bloodType:
          type: string
        hospital:
          type: string
        city:
          type: string
        contactPhone:
          type: string
        unitsNeeded:
          type: integer
        urgency:
          type: string
        notes:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - patientName
        - bloodType
        - hospital
        - city
        - contactPhone
        - unitsNeeded
        - urgency
        - status
        - createdAt

    CreateBloodRequestRequest:
      type: object
      properties:
        patientName:
          type: string
        bloodType:
          type: string
        hospital:
          type: string
        city:
          type: string
        contactPhone:
          type: string
        unitsNeeded:
          type: integer
        urgency:
          type: string
          enum: [low, medium, high, critical]
        notes:
          type: string
          nullable: true
      required:
        - patientName
        - bloodType
        - hospital
        - city
        - contactPhone
        - unitsNeeded
        - urgency

    UpdateBloodRequestRequest:
      type: object
      properties:
        status:
          type: string
          enum: [open, fulfilled, cancelled]

    Stats:
      type: object
      properties:
        totalDonors:
          type: integer
        availableDonors:
          type: integer
        totalRequests:
          type: integer
        openRequests:
          type: integer
        bloodTypeBreakdown:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalDonors
        - availableDonors
        - totalRequests
        - openRequests
        - bloodTypeBreakdown

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        donorId:
          type: integer
          nullable: true
      required:
        - id
        - name
        - email

    Appointment:
      type: object
      properties:
        id:
          type: integer
        donorEmail:
          type: string
        donorName:
          type: string
        date:
          type: string
        time:
          type: string
        center:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - donorEmail
        - donorName
        - date
        - time
        - center
        - status
        - createdAt

    CreateAppointmentRequest:
      type: object
      properties:
        donorEmail:
          type: string
        donorName:
          type: string
        date:
          type: string
        time:
          type: string
        center:
          type: string
      required:
        - donorEmail
        - donorName
        - date
        - time
        - center

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
