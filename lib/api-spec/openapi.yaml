openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Blood Donor Website API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: donors
    description: Donor management
  - name: requests
    description: Blood request management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /donors:
    get:
      operationId: getDonors
      tags: [donors]
      summary: Get all donors
      parameters:
        - name: bloodType
          in: query
          required: false
          schema:
            type: string
        - name: city
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of donors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Donor"
    post:
      operationId: createDonor
      tags: [donors]
      summary: Register as a donor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonorRequest"
      responses:
        "201":
          description: Donor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /donors/{id}:
    get:
      operationId: getDonorById
      tags: [donors]
      summary: Get donor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Donor found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donor"
        "404":
          description: Donor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blood-requests:
    get:
      operationId: getBloodRequests
      tags: [requests]
      summary: Get all blood requests
      parameters:
        - name: bloodType
          in: query
          required: false
          schema:
            type: string
        - name: urgency
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of blood requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BloodRequest"
    post:
      operationId: createBloodRequest
      tags: [requests]
      summary: Create a blood request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBloodRequestRequest"
      responses:
        "201":
          description: Blood request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blood-requests/{id}:
    patch:
      operationId: updateBloodRequest
      tags: [requests]
      summary: Update blood request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBloodRequestRequest"
      responses:
        "200":
          description: Blood request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BloodRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [donors]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Donor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bloodType:
          type: string
        city:
          type: string
        phone:
          type: string
        email:
          type: string
        isAvailable:
          type: boolean
        lastDonation:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - bloodType
        - city
        - phone
        - email
        - isAvailable
        - createdAt

    CreateDonorRequest:
      type: object
      properties:
        name:
          type: string
        bloodType:
          type: string
        city:
          type: string
        phone:
          type: string
        email:
          type: string
        lastDonation:
          type: string
          nullable: true
      required:
        - name
        - bloodType
        - city
        - phone
        - email

    BloodRequest:
      type: object
      properties:
        id:
          type: integer
        patientName:
          type: string
        bloodType:
          type: string
        hospital:
          type: string
        city:
          type: string
        contactPhone:
          type: string
        unitsNeeded:
          type: integer
        urgency:
          type: string
        notes:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - patientName
        - bloodType
        - hospital
        - city
        - contactPhone
        - unitsNeeded
        - urgency
        - status
        - createdAt

    CreateBloodRequestRequest:
      type: object
      properties:
        patientName:
          type: string
        bloodType:
          type: string
        hospital:
          type: string
        city:
          type: string
        contactPhone:
          type: string
        unitsNeeded:
          type: integer
        urgency:
          type: string
          enum: [low, medium, high, critical]
        notes:
          type: string
          nullable: true
      required:
        - patientName
        - bloodType
        - hospital
        - city
        - contactPhone
        - unitsNeeded
        - urgency

    UpdateBloodRequestRequest:
      type: object
      properties:
        status:
          type: string
          enum: [open, fulfilled, cancelled]

    Stats:
      type: object
      properties:
        totalDonors:
          type: integer
        availableDonors:
          type: integer
        totalRequests:
          type: integer
        openRequests:
          type: integer
        bloodTypeBreakdown:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalDonors
        - availableDonors
        - totalRequests
        - openRequests
        - bloodTypeBreakdown

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
