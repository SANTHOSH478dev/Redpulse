<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | RedPulse</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>


<header>
  <div class="container nav">
    <div class="logo">🩸 RedPulse</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="donors.html">Find Donors</a>
      <a href="donate.html">Donate Now</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="register.html">Register</a>
      <a class="login" href="login.html">Login</a>
    </nav>
  </div>
</header>


<section class="page login-page">
  <div class="container center-box">

    <div class="login-card">

      <h2>Welcome Back 👋</h2>
      <p class="login-sub">
        Login to manage your donor account and help save lives
      </p>

      <form onsubmit="return loginUser()">

        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button class="btn full">Login</button>

        <p class="small center">
          Don’t have an account?
          <a href="donate.html">Register as Donor</a>
        </p>

      </form>

    </div>

  </div>
</section>


<footer class="site-footer">
  <p>© 2026 RedPulse | Blood Donation Platform</p>
</footer>

<script src="js/login.js"></script>
<script src="js/auth-check.js"></script>

</body>
</html>
