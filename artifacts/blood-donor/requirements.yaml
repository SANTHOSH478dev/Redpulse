packages:
  "framer-motion": "For page transitions and scroll animations"
  "lucide-react": "For beautiful consistent icons"
  "clsx": "For conditional class names"
  "tailwind-merge": "For merging tailwind classes safely"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For zod schema validation in forms"
  "zod": "For form schema definitions"
  "date-fns": "For formatting dates nicely"

images:
  - path: "artifacts/blood-donor/public/images/hero-bg.png"
    description: "Abstract modern medical background with very soft warm red and white gradients, clean professional humanitarian feel, subtle geometric shapes"
    aspect_ratio: "16:9"
  - path: "artifacts/blood-donor/public/images/logo-mark.png"
    description: "Minimalist geometric logo of a blood drop intertwined with a heart, deep red on transparent background, modern startup style"
    aspect_ratio: "1:1"

notes:
  - "The app uses generated React Query hooks from @workspace/api-client-react"
  - "The API is hosted at /api prefix and handles donor and request workflows"
  - "Routing uses wouter with a BASE_URL for environment compatibility"
